name: CI - Build & Test

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: |
          dotnet restore src/Milvaion.Api/Milvaion.Api.csproj
          dotnet restore tests/Milvaion.UnitTests/Milvaion.UnitTests.csproj
          dotnet restore tests/Milvaion.IntegrationTests/Milvaion.IntegrationTests.csproj

      - name: Build projects
        run: |
          dotnet build src/Milvaion.Api/Milvaion.Api.csproj --no-restore --configuration Release
          dotnet build tests/Milvaion.UnitTests/Milvaion.UnitTests.csproj --no-restore --configuration Release
          dotnet build tests/Milvaion.IntegrationTests/Milvaion.IntegrationTests.csproj --no-restore --configuration Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/bin/Release
            !**/node_modules/**
          retention-days: 1

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore tests/Milvaion.UnitTests/Milvaion.UnitTests.csproj

      - name: Run Unit Tests
        run: dotnet test tests/Milvaion.UnitTests/Milvaion.UnitTests.csproj --no-restore --configuration Release --logger "trx;LogFileName=unit-test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ./TestResults
          retention-days: 30

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: ./TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: MilvaionTestDb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore tests/Milvaion.IntegrationTests/Milvaion.IntegrationTests.csproj

      - name: Run Integration Tests
        run: dotnet test tests/Milvaion.IntegrationTests/Milvaion.IntegrationTests.csproj --no-restore --configuration Release --logger "trx;LogFileName=integration-test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults
        env:
          ConnectionStrings__DefaultConnectionString: "Host=localhost;Port=5432;Database=MilvaionTestDb;Username=postgres;Password=testpassword123"
          Redis__ConnectionString: "localhost:6379"
          RabbitMQ__Host: "localhost"
          RabbitMQ__Port: "5672"

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: ./TestResults
          retention-days: 30

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Test Results
          path: ./TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Unit Test Results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: ./TestResults/Unit

      - name: Download Integration Test Results
        uses: actions/download-artifact@v4
        with:
          name: integration-test-results
          path: ./TestResults/Integration

      - name: List coverage files
        run: |
          echo "=== Coverage files found ==="
          find ./TestResults -name "*.xml" -o -name "*.cobertura.xml" -o -name "coverage.*" | head -20
          echo "=== Directory structure ==="
          ls -la ./TestResults/ || true
          ls -la ./TestResults/Unit/ || true
          ls -la ./TestResults/Integration/ || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./TestResults/**/coverage.cobertura.xml
          flags: unittests,integrationtests
          fail_ci_if_error: false
          verbose: true
